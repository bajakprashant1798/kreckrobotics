<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Page with Zoom & Angles</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #lens {
  position: absolute;
  border: 1px solid #000;
  width: 100px;
  height: 100px;
  display: none;
  pointer-events: none;
}

#zoom-result {
  width: 300px;
  height: 300px;
  border: 1px solid #d4d4d4;
  background-repeat: no-repeat;
  display: none;
  margin-top: 10px;
}

  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="logo">
      <img src="images/logo.png" alt="Company Logo">
    </div>
    <div class="back-button">
      <a href="product_card.html" class="back-link">← Back to Products</a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <div class="left-column">
        

      <!-- Main Image with Zoom and Lens -->
      <div class="main-image-wrapper">
        <div class="img-container">
          <img src="images/bluetooth_speaker.png" alt="Product Image" id="main-image" class="zoom-image">
          <div id="lens" class="lens"></div> <!-- Lens box -->
          <div id="zoom-result" class="zoom-result"></div> <!-- Enlarged preview -->
        </div>
      </div>
    

      <!-- Thumbnails -->
      <div class="thumbnail-row" id="thumbnail-row">
        <img src="images/bluetooth_speaker.png" class="thumb active" data-angle="1">
        <img src="images/bluetooth_speaker_1.png" class="thumb" data-angle="2">
        <img src="images/bluetooth_speaker_3.png" class="thumb" data-angle="3">
      </div>
    </div>

    <div class="right-column">
      <div class="product-description">
        <h1>Bluetooth</h1>
        <p>A smart wireless lamp with dimmable light.</p>
      </div>

      <div class="product-configuration">

        <!-- Board Color -->
        

       

      </div>
    </div>
  </main>
<script src="b_scprit.js"></script>
  <!-- JS Script -->
  
</body>
</html>
